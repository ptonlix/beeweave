name: 缺陷报告
description: 报告 BeeWeave CLI、技能、安装流程或文档站点中的可复现问题。
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供可复现信息，便于快速定位和修复。

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      description: 这个问题主要发生在哪个模块？
      options:
        - CLI / setup / profile
        - Skills / Agent workflow
        - Workbench / inbox
        - Vault / ingest / query
        - Documentation
        - Browser extension
        - Tests / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及为什么这是一个问题。
      placeholder: 运行 bwe setup 时，选择 Codex 后没有安装项目本地 skills。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请写出从干净状态开始的最小复现步骤。
      placeholder: |
        1. 运行 `...`
        2. 选择 `...`
        3. 查看 `...`
        4. 看到错误 `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你原本预期应该发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为 / 日志
      description: 粘贴错误输出、堆栈、截图文字或相关日志。请移除 token、路径中的敏感信息和个人数据。
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请尽量填写版本和运行环境。
      value: |
        - OS:
        - Python:
        - BeeWeave commit / version:
        - Agent / runtime:
        - Shell:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 相关配置、链接、截图、可能的原因或临时绕过方案。
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 issues，确认这不是重复问题。
          required: true
        - label: 我已移除日志、截图或配置中的敏感信息。
          required: true

