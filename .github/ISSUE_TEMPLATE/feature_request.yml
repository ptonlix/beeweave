name: 功能请求 / 改进建议
description: 提出新的 BeeWeave 能力、工作流改进或现有行为优化。
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        请优先描述问题和使用场景，再描述你希望的方案。这样更容易判断实现边界。

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      description: 这个建议主要涉及哪个模块？
      options:
        - CLI / setup / profile
        - Skills / Agent workflow
        - Workbench / inbox
        - Vault / ingest / query
        - Documentation
        - Browser extension
        - Tests / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景和问题
      description: 当前遇到什么限制、重复劳动或不清晰的行为？
      placeholder: 当用户通过 beeweave-url-capture 保存网页时，依赖 skill 的偏好询问会打断流程。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望 BeeWeave 如何表现。可以包含命令、skill 规则、配置或文档结构。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过哪些替代方案？为什么不够好？
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: 示例或参考
      description: 可以粘贴示例命令、伪代码、相关 issue、设计参考或其他项目链接。
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: 是否可能影响兼容性？
      options:
        - 不确定
        - 否，应该是向后兼容
        - 是，可能改变现有命令、配置或 skill 行为
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 issues，确认这不是重复建议。
          required: true
        - label: 我已说明使用场景，而不只是描述实现细节。
          required: true

